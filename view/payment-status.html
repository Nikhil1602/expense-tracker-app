<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Payment Status</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            background: #0066ff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            width: 350px;
        }

        .icon {
            font-size: 60px;
        }
    </style>
</head>

<body>

    <div class="card shadow">
        <div id="icon" class="icon text-secondary">⏳</div>
        <h3 id="title" class="mt-3">Processing Payment...</h3>
        <p id="message" class="text-muted">Please wait while we verify your transaction.</p>

        <button id="btn" class="btn btn-primary mt-3 d-none">
            Go to App
        </button>
    </div>

    <script>
        const icon = document.getElementById("icon");
        const title = document.getElementById("title");
        const message = document.getElementById("message");
        const btn = document.getElementById("btn");
        const token = localStorage.getItem("token");

        const orderId = new URLSearchParams(window.location.search).get("order_id");

        const ORDER_API = `http://localhost:3000/api/order`;

        const authConfig = {
            headers: {
                Authorization: `Bearer ${token}`
            }
        };

        async function verifyPayment() {

            try {

                const res = await axios.post(ORDER_API + "/verify-payment", { orderId }, authConfig);

                if (res.data.success) {

                    // ✅ SUCCESS
                    icon.innerHTML = "✅";
                    icon.classList.remove("text-secondary");
                    icon.classList.add("text-success");

                    title.textContent = "Payment Successful!";
                    message.textContent = "You are now a premium user 🎉";

                } else {

                    // ❌ FAILED
                    icon.innerHTML = "❌";
                    icon.classList.remove("text-secondary");
                    icon.classList.add("text-danger");

                    title.textContent = "Payment Failed!";
                    message.textContent = "Something went wrong. Please try again.";

                }

            } catch (error) {

                // ⚠️ ERROR
                icon.innerHTML = "⚠️";
                icon.classList.remove("text-secondary");
                icon.classList.add("text-warning");

                title.textContent = "Error!";
                message.textContent = "Unable to verify payment. Try again later.";

            }

            btn.classList.remove("d-none");
        }

        btn.onclick = () => {
            window.location.href = "./expense-tracker.html";
        };

        verifyPayment();
    </script>

</body>

</html>
