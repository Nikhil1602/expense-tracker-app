<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Expense Tracker</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <style>
        * {
            font-family: cursive, Times, serif;
            box-sizing: border-box;
        }

        .amount-col {
            width: 150px;
            white-space: nowrap;
            text-align: right;
        }
    </style>
</head>

<body class="bg-primary">

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-danger" onclick="logout()">Logout</button>
            <div class="d-flex gap-2">
                <button id="buyPremium" class="btn btn-warning" onclick="handleBuyPremium()">Buy Premium
                    Membership</button>
                <button class="btn btn-secondary" onclick="deleteAllExpenses()">Reset</button>
            </div>
        </div>

        <div class="card shadow-lg">
            <div class="card-body">

                <h2 class="text-center mb-5">Expense Tracker 💸</h2>

                <!-- FORM -->
                <form id="expense-form" class="row g-2 mb-4">
                    <div class="col-md-3">
                        <input type="text" id="name" class="form-control" placeholder="Expense Name" required>
                    </div>

                    <div class="col-md-2">
                        <input type="number" id="amount" class="form-control" placeholder="Amount" required>
                    </div>

                    <div class="col-md-2">
                        <select id="category" class="form-select" required>
                            <option value="">Category</option>
                            <option>Food</option>
                            <option>Transport</option>
                            <option>Entertainment</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <input type="date" id="date" class="form-control" required>
                    </div>

                    <div class="col-md-2 d-grid">
                        <button id="submitBtn" type="submit" class="btn btn-primary">Add</button>
                    </div>
                </form>

                <!-- FILTER -->
                <div class="d-flex justify-content-end mb-3">
                    <select id="filter" class="form-select w-auto">
                        <option value="All">All</option>
                        <option>Food</option>
                        <option>Transport</option>
                        <option>Entertainment</option>
                        <option>Other</option>
                    </select>
                </div>

                <!-- TABLE -->
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Amount</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="list"></tbody>
                    </table>
                </div>

                <!-- TOTAL -->
                <h5 class="text-end">Total: ₹<span id="total">0</span></h5>

            </div>

            <div id="leaderboardSection" class="m-3" style="display:none;">
                <h4>🏆 Leaderboard</h4>
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th class="amount-col text-center">Total Expense</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardList"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API = `http://localhost:3000/api`;

        const form = document.getElementById("expense-form");
        const list = document.getElementById("list");
        const totalEl = document.getElementById("total");
        const filter = document.getElementById("filter");
        const submitBtn = document.getElementById("submitBtn");
        const token = localStorage.getItem("token");

        let expenses = [];
        let editId = null;
        let isPremiumUser = false;

        if (!token) {
            alert("Please login first");
            window.location.href = "./login.html";
        }

        const authConfig = {
            headers: {
                Authorization: `Bearer ${token}`
            }
        };

        // 🔥 LOAD DATA ON PAGE LOAD
        window.addEventListener("DOMContentLoaded", fetchExpenses);

        async function showLeaderboard() {

            try {

                document.getElementById("leaderboardSection").style.display = "block";

                const res = await axios.get(`${API}/premium/leaderboard`, authConfig);
                const users = res.data;

                const list = document.getElementById("leaderboardList");
                list.innerHTML = "";

                // const currentUserId = JSON.parse(atob(token.split('.')[1])).userId;

                users.forEach((user, index) => {
                    list.innerHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${user.name}</td>
                            <td class="amount-col text-center" style="color: red;">₹${Number(user.totalExpense).toFixed(2)}</td>
                        </tr>
                    `;
                });

            } catch (err) {

                console.error(err);

            }

        }

        function handlePremiumUI() {

            const premiumBtn = document.getElementById("buyPremium");

            if (isPremiumUser) {
                premiumBtn.style.display = "none";
                showLeaderboard();
            } else {
                premiumBtn.style.display = "block";
            }

        }

        // ✅ GET ALL EXPENSES
        async function fetchExpenses() {

            try {

                const res = await axios.get(`${API}/expense`, authConfig);
                expenses = res.data.expenses;
                isPremiumUser = res.data.isPremium;

                const today = new Date().toISOString().split("T")[0];
                document.getElementById("date").value = today;

                render(expenses);
                updateTotal(expenses);
                handlePremiumUI();

            } catch (err) {

                console.error(err);

            }

        }

        // ✅ ADD EXPENSE
        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            const expense = {
                name: form.name.value,
                amount: parseFloat(form.amount.value),
                category: form.category.value,
                date: form.date.value
            };

            try {

                if (editId) {
                    // 🔥 UPDATE API
                    await axios.put(`${API}/expense/${editId}`, expense, authConfig);

                    editId = null;
                } else {
                    // CREATE
                    await axios.post(`${API}/expense`, expense, authConfig);
                }

                form.reset();
                editId = null;

                // 🔥 reset button text
                submitBtn.innerText = "Add";

                fetchExpenses();

            } catch (err) {

                console.error(err);

            }

        });

        // ✅ DELETE & EDIT
        list.addEventListener("click", async (e) => {

            const id = e.target.dataset.id;

            // DELETE
            if (e.target.classList.contains("delete")) {
                try {
                    await axios.delete(`${API}/expense/${id}`, authConfig);
                    expenses = expenses.filter(exp => exp.id != id);
                    render(expenses);
                    updateTotal(expenses);
                } catch (err) {
                    console.error(err);
                }
            }

            // EDIT
            if (e.target.classList.contains("edit")) {

                const id = e.target.dataset.id;
                const exp = expenses.find(e => e.id == id);

                form.name.value = exp.name;
                form.amount.value = exp.amount;
                form.category.value = exp.category;
                form.date.value = exp.date;

                // 🔥 store id for update
                editId = id;
                submitBtn.innerText = "Update";

            }

        });

        // ✅ FILTER
        filter.addEventListener("change", () => {

            if (filter.value === "All") {
                render(expenses);
                updateTotal(expenses);
            } else {
                const filtered = expenses.filter(e => e.category === filter.value);
                render(filtered);
                updateTotal(filtered);
            }

        });

        // ✅ RENDER
        function render(data) {

            list.innerHTML = "";

            if (!data.length) {
                list.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No expenses yet 🚀</td></tr>`;
                return;
            }

            const sorted = [...data].sort((a, b) => new Date(b.date) - new Date(a.date));

            sorted.forEach(exp => {
                list.innerHTML += `
                    <tr>
                        <td>${exp.name}</td>
                        <td>₹${Number(exp.amount).toFixed(2)}</td>
                        <td>${exp.category}</td>
                        <td>${formatDate(exp.date)}</td>
                        <td>
                            <button class="btn btn-sm btn-warning edit" data-id="${exp.id}">Edit</button>
                            <button class="btn btn-sm btn-danger delete" data-id="${exp.id}">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        // DELETE ALL
        async function deleteAllExpenses() {

            if (!confirm("Delete all expenses?")) return;
            await axios.delete(`${API}/expense`, authConfig);
            fetchExpenses();

        }

        // ✅ TOTAL
        function updateTotal(data) {
            const total = data.reduce((sum, e) => sum + Number(e.amount), 0);
            totalEl.textContent = total.toFixed(2);
        }

        function formatDate(dateStr) {

            const date = new Date(dateStr);

            const day = String(date.getDate()).padStart(2, "0");
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const year = date.getFullYear();

            return `${day}-${month}-${year}`;

        }

        function logout() {

            localStorage.removeItem("token");
            window.location.href = "./login.html";

        }

        const handleBuyPremium = async () => {

            const res = await axios.get(`${API}/order/create-order`, authConfig);

            const { paymentSessionId, orderId } = res.data;
            const cashfree = Cashfree({ mode: "sandbox" });

            await cashfree.checkout({
                paymentSessionId,
                redirectTarget: "_self"
            });

        };

    </script>

</body>

</html>
