<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Expense Tracker</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <style>
        * {
            font-family: cursive, Times, serif;
            box-sizing: border-box;
        }

        .amount-col {
            width: 150px;
            white-space: nowrap;
            text-align: right;
        }
    </style>
</head>

<body class="bg-primary">

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-danger" onclick="logout()">Logout</button>
            <div class="d-flex gap-2">
                <button id="buyPremium" class="btn btn-warning" onclick="handleBuyPremium()">Buy Premium
                    Membership</button>
                <button class="btn btn-secondary" onclick="deleteAllExpenses()">Reset</button>
            </div>
        </div>

        <div class="card shadow-lg">
            <div class="card-body">

                <h2 class="text-center mb-5">Expense Tracker 💸</h2>

                <!-- FORM -->
                <form id="expense-form" class="row g-2 mb-4">
                    <div class="col-md-3">
                        <input type="text" id="name" class="form-control" placeholder="Expense Name" required>
                    </div>

                    <div class="col-md-2">
                        <input type="number" id="amount" class="form-control" placeholder="Amount" required>
                    </div>

                    <div class="col-md-2">
                        <select id="category" class="form-select" required>
                            <option value="">Category</option>
                            <option>Food</option>
                            <option>Transport</option>
                            <option>Entertainment</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <input type="date" id="date" class="form-control" required>
                    </div>

                    <div class="col-md-2 d-grid">
                        <button id="submitBtn" type="submit" class="btn btn-primary">Add</button>
                    </div>
                </form>

                <!-- FILTER -->


                <div class="d-flex justify-content-between mb-2 gap-2">
                    <select id="filter" class="form-select w-auto">
                        <option value="All">All</option>
                        <option>Food</option>
                        <option>Transport</option>
                        <option>Entertainment</option>
                        <option>Other</option>
                    </select>

                    <div class="d-flex align-items-center gap-2">
                        <label>Show:</label>
                        <select id="pageSize" class="form-select w-auto">
                            <option value="5">5</option>
                            <option value="10">10</option>
                            <option value="20">20</option>
                            <option value="40">40</option>
                        </select>
                    </div>
                </div>

                <div id="premiumFeatures" class="d-none mt-3 mb-3">

                    <div class="d-flex justify-content-between align-items-center">

                        <select id="timeFilter" class="form-select w-auto">
                            <option value="all">All Time</option>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                        </select>

                        <button class="btn btn-success" onclick="downloadExpenses()">
                            Download Expenses
                        </button>

                    </div>

                </div>

                <!-- TABLE -->
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Amount</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="list"></tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-center mt-3" id="pagination"></div>

                <!-- TOTAL -->
                <h5 class="text-end">Total: ₹<span id="total">0</span></h5>

            </div>

            <div id="leaderboardSection" class="m-3" style="display:none;">
                <h4>🏆 Leaderboard</h4>
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th class="amount-col text-center">Total Expense</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardList"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API = `http://localhost:3000/api`;

        const form = document.getElementById("expense-form");
        const list = document.getElementById("list");
        const totalEl = document.getElementById("total");
        const filter = document.getElementById("filter");
        const submitBtn = document.getElementById("submitBtn");
        const token = localStorage.getItem("token");

        let expenses = [];
        let filteredExpenses = [];
        let editId = null;
        let isPremiumUser = false;

        let currentPage = 1;
        let itemsPerPage = 5;

        if (!token) {
            alert("Please login first");
            window.location.href = "./login.html";
        }

        const authConfig = {
            headers: { Authorization: `Bearer ${token}` }
        };

        window.addEventListener("DOMContentLoaded", fetchExpenses);

        document.getElementById("pageSize").addEventListener("change", (e) => {

            itemsPerPage = parseInt(e.target.value);

            // 💾 Save preference
            localStorage.setItem("pageSize", itemsPerPage);

            // 🔄 Reset page (important)
            currentPage = 1;

            render();
        });

        async function fetchExpenses() {

            try {

                currentPage = 1;

                const savedPageSize = localStorage.getItem("pageSize");

                if (savedPageSize) {
                    itemsPerPage = parseInt(savedPageSize);
                    document.getElementById("pageSize").value = savedPageSize;
                }

                const res = await axios.get(`${API}/expense`, authConfig);

                expenses = res.data.expenses;
                filteredExpenses = [...expenses]; // 🔥 important

                isPremiumUser = res.data.isPremium;

                document.getElementById("date").value =
                    new Date().toISOString().split("T")[0];

                render();
                updateTotal(filteredExpenses);
                handlePremiumUI();

            } catch (err) {
                console.error(err);
            }
        }

        function render() {
            list.innerHTML = "";

            if (!filteredExpenses.length) {
                list.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No expenses yet 🚀</td></tr>`;
                return;
            }

            const start = (currentPage - 1) * itemsPerPage;
            const paginatedData = filteredExpenses.slice(start, start + itemsPerPage);

            const sorted = [...paginatedData].sort(
                (a, b) => new Date(b.date) - new Date(a.date)
            );

            sorted.forEach(exp => {
                list.innerHTML += `
                <tr>
                    <td>${exp.name}</td>
                    <td>₹${Number(exp.amount).toFixed(2)}</td>
                    <td>${exp.category}</td>
                    <td>${formatDate(exp.date)}</td>
                    <td>
                        <button class="btn btn-sm btn-warning edit" data-id="${exp.id}">Edit</button>
                        <button class="btn btn-sm btn-danger delete" data-id="${exp.id}">Delete</button>
                    </td>
                </tr>
            `;
            });

            setupPagination();
        }

        function setupPagination() {
            const pagination = document.getElementById("pagination");
            pagination.innerHTML = "";

            const totalPages = Math.ceil(filteredExpenses.length / itemsPerPage);

            if (totalPages <= 1) return; // 🔥 fix: don't show if not needed

            if (currentPage > 1) {
                pagination.innerHTML += `
                <button class="btn btn-secondary mx-1" onclick="changePage(${currentPage - 1})">Prev</button>
            `;
            }

            for (let i = 1; i <= totalPages; i++) {
                pagination.innerHTML += `
                <button class="btn ${i === currentPage ? 'btn-warning' : 'btn-secondary'} mx-1"
                    onclick="changePage(${i})">${i}</button>
            `;
            }

            if (currentPage < totalPages) {
                pagination.innerHTML += `
                <button class="btn btn-secondary mx-1" onclick="changePage(${currentPage + 1})">Next</button>
            `;
            }
        }

        function changePage(page) {
            currentPage = page;
            render();
        }

        // CATEGORY FILTER
        filter.addEventListener("change", () => {
            currentPage = 1;

            if (filter.value === "All") {
                filteredExpenses = [...expenses];
            } else {
                filteredExpenses = expenses.filter(e => e.category === filter.value);
            }

            render();
            updateTotal(filteredExpenses);
        });

        // TIME FILTER
        document.getElementById("timeFilter").addEventListener("change", () => {
            applyTimeFilter();
        });

        function applyTimeFilter() {
            currentPage = 1;

            const type = document.getElementById("timeFilter").value;
            const now = new Date();

            filteredExpenses = [...expenses];

            if (type === "daily") {
                filteredExpenses = expenses.filter(e =>
                    new Date(e.date).toDateString() === now.toDateString()
                );
            }

            if (type === "weekly") {
                const start = new Date();
                start.setDate(now.getDate() - 7);

                filteredExpenses = expenses.filter(e => {
                    const d = new Date(e.date);
                    return d >= start && d <= now;
                });
            }

            if (type === "monthly") {
                filteredExpenses = expenses.filter(e => {
                    const d = new Date(e.date);
                    return d.getMonth() === now.getMonth() &&
                        d.getFullYear() === now.getFullYear();
                });
            }

            render();
            updateTotal(filteredExpenses);
        }

        function updateTotal(data) {
            const total = data.reduce((sum, e) => sum + Number(e.amount), 0);
            totalEl.textContent = total.toFixed(2);
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return `${String(d.getDate()).padStart(2, "0")}-${String(d.getMonth() + 1).padStart(2, "0")}-${d.getFullYear()}`;
        }
    </script>

</body>

</html>
