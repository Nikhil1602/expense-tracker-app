<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .reset-card {
            width: 400px;
            border-radius: 15px;
            padding: 30px;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 10px;
            background: #667eea;
            color: white;
        }

        .btn-custom:hover {
            background: #5a67d8;
        }

        .message {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="reset-card">

        <h3 class="title">🔒 Reset Password</h3>

        <div id="forgotSection">
            <input id="newPassword" type="password" placeholder="New Password" class="form-control mb-2">
            <input id="confirmPassword" type="password" placeholder="Confirm Password" class="form-control mb-2">
            <button onclick="resetPassword()" class="btn btn-success w-100">Reset</button>
        </div>

        <div id="message" class="message"></div>

    </div>

    <script>

        const API = `http://localhost:3000/api/password`;

        async function resetPassword() {

            const password = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const params = new URLSearchParams(window.location.search);

            const token = params.get("token");
            const rid = params.get("rid");

            if (password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            try {

                const reqBody = { token, password, rid };

                await axios.post(`${API}/reset`, reqBody);

                alert("Password reset successful");
                window.location.href = "./login.html";

            } catch (err) {

                console.log(err);
                alert("Invalid or expired link");

            }

        }

    </script>

</body>

</html>
