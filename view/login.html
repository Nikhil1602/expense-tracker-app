<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .signup-card {
            width: 400px;
            border-radius: 15px;
            padding: 30px;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 10px;
            background: #667eea;
            color: white;
        }

        .btn-custom:hover {
            background: #5a67d8;
        }

        .message {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="signup-card">

        <h3 class="title">🚀 Login</h3>

        <div id="forgotSection" style="display:none;">
            <input id="forgotEmail" type="email" class="form-control mb-2" placeholder="Enter your email">

            <button onclick="sendResetLink()" class="btn btn-warning w-100">
                Send Reset Link
            </button>
        </div>

        <input id="email" type="email" class="form-control mb-3" placeholder="Email">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">
        <p id="forgot-password" class="text-end">
            <a href="#" onclick="showForgotPassword()" style="font-size: 14px;">
                Forgot Password?
            </a>
        </p>

        <button id="login-btn" onclick="login()" class="btn btn-custom w-100">
            Login
        </button>

        <a id="switch-link" href="./signup.html" class="d-block text-center mt-3" style="color: #667eea;">
            Don't have an account? Sign up here
        </a>

        <div id="message" class="message"></div>

    </div>

    <script>

        const API = `http://localhost:3000/api`;

        // LOGIN FUNCTION
        async function login() {

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const message = document.getElementById("message");

            if (!email || !password) {
                message.innerHTML = "⚠️ All fields are required";
                message.style.color = "red";
                return;
            }

            try {

                const res = await axios.post(`${API}/user/login`, { email, password });

                localStorage.setItem("token", res.data.token);

                message.innerHTML = "✅ Login successful!";
                message.style.color = "green";

                // clear fields
                document.getElementById("email").value = "";
                document.getElementById("password").value = "";

                setTimeout(() => {
                    window.location.href = "./expense-tracker.html";
                }, 1000);

            } catch (err) {

                message.innerHTML = err.response?.data?.message || "❌ Login failed";
                message.style.color = "red";

            }

        }

        function showForgotPassword() {

            document.getElementById("forgotSection").style.display = "block";
            document.getElementById("email").style.display = "none";
            document.getElementById("password").style.display = "none";
            document.getElementById("login-btn").style.display = "none";
            document.getElementById("switch-link").style.display = "none !important";
            document.getElementById("forgot-password").style.display = "none";
            document.getElementsByClassName("title")[0].innerText = "🔒 Forgot Password";

        }

        async function sendResetLink() {

            const email = document.getElementById("forgotEmail").value;

            try {

                const res = await axios.post(`${API}/password/forgot`, { email });

                alert("Reset link sent to your email");

            } catch (err) {
                console.error(err);
                alert("Failed to send email");
            }

        }

    </script>

</body>

</html>
